<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday Nadège 🔮</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

  :root {
    --cyan: #38bdf8;
    --blue: #60a5fa;
    --blue-glow: rgba(96, 165, 250, 0.4);
    --pale: #e0e7ff;
    --indigo: #6366f1;
    --indigo-glow: rgba(99, 102, 241, 0.4);
    --cyan-glow: rgba(56, 189, 248, 0.45);
    --dark: #05030a;
    --dark2: #0f0b1e;
    --text-mono: #818cf8;
    --white: #f5f3ff;
    --gold: #fbbf24;
    --gold-glow: rgba(251, 191, 36, 0.35);
    --page-bg: #0a0818;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-mono);
    touch-action: manipulation;
  }

  /* ── CRT SCANLINES ── */
  .scanlines {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 1000;
    opacity: 0.06;
    background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.4) 50%);
    background-size: 100% 4px;
  }

  /* ── TERMINAL ── */
  #terminal {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    justify-content: flex-start; overflow-y: auto;
    padding: clamp(20px, 6vw, 40px);
    background: var(--dark);
    z-index: 10; transition: opacity 0.6s ease;
  }
  #terminal-output {
    width: 100%; margin-top: auto; margin-bottom: 0;
    font-size: clamp(11px, 3.2vw, 15px);
    line-height: 2; letter-spacing: 0.03em;
  }
  .t-line { display: block; opacity: 0; transform: translateY(4px); transition: opacity 0.3s, transform 0.3s; }
  .t-line.visible { opacity: 1; transform: translateY(0); }
  .t-prompt { color: var(--indigo); }
  .t-ok { color: #34d399; }
  .t-bar { display: inline-block; background: var(--cyan); width: 2px; height: 1em; vertical-align: middle; animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── GLITCH ── */
  #glitch-overlay {
    position: fixed; inset: 0; z-index: 20;
    pointer-events: none; opacity: 0;
    background: var(--blue); mix-blend-mode: screen;
    animation: breatheBlue 6s ease-in-out infinite;
  }

  /* ── GRIMOIRE SCREEN ── */
  #grimoire-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 40%, #0f0b2e 0%, #05030a 70%);
    opacity: 0; pointer-events: none;
    transition: opacity 1.2s ease; overflow: hidden;
  }
  #grimoire-screen.active { opacity: 1; pointer-events: all; }

  #canvas-stars {
    position: absolute; inset: 0; width: 100%; height: 100%;
  }
  #canvas-sparks {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
  }

  /* ── BOOK WRAPPER ── */
  #book-wrapper {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    width: min(92vw, 860px);
    height: min(82vh, 560px);
    filter: drop-shadow(0 0 50px rgba(56,189,248,0.35)) drop-shadow(0 0 100px rgba(56,189,248,0.12));
    animation: bookFloat 6s ease-in-out infinite;
  }
  @keyframes bookFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  #book {
    display: flex; width: 100%; height: 100%;
    border-radius: clamp(6px, 1.5vw, 12px);
    overflow: hidden;
    background: #040211;
    box-shadow: inset 0 0 60px rgba(56,189,248,0.06), 0 0 0 1px rgba(56,189,248,0.2);
  }

  /* ── LEFT PAGE ── */
  #page-left {
    flex: 0 0 38%;
    background: linear-gradient(155deg, #0b0921 0%, #080618 100%);
    border-right: 1px solid rgba(56,189,248,0.18);
    padding: clamp(14px, 2.8vw, 26px) clamp(12px, 2.2vw, 22px);
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  #page-left::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 25% 15%, rgba(56,189,248,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 85%, rgba(56,189,248,0.04) 0%, transparent 50%);
    pointer-events: none;
  }
  /* Corner fold */
  #page-left::after {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: clamp(18px,3.5vw,28px) clamp(18px,3.5vw,28px) 0 0;
    border-color: rgba(56,189,248,0.12) transparent transparent transparent;
  }

  .book-header {
    text-align: center;
    margin-bottom: clamp(12px, 2.5vw, 20px);
    padding-bottom: clamp(10px, 2vw, 16px);
    border-bottom: 1px solid rgba(56,189,248,0.18);
  }
  .book-header-label {
    display: block;
    font-size: clamp(7px, 1.6vw, 9px);
    color: rgba(56,189,248,0.45);
    letter-spacing: 0.28em; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .book-header-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 4.5vw, 30px);
    font-weight: 300; color: var(--pale); letter-spacing: 0.06em;
  }

  .rune-list {
    flex: 1; display: flex; flex-direction: column;
    justify-content: space-around;
    gap: clamp(3px, 0.8vw, 6px);
  }

  .rune-entry {
    display: flex; align-items: center;
    gap: clamp(8px, 1.8vw, 14px);
    padding: clamp(6px, 1.4vw, 10px) clamp(8px, 1.8vw, 14px);
    border-radius: 6px; cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid transparent;
    position: relative; overflow: hidden;
  }
  .rune-entry::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(56,189,248,0) 0%, rgba(56,189,248,0.09) 100%);
    opacity: 0; transition: opacity 0.3s;
  }
  .rune-entry:hover::before, .rune-entry.active::before { opacity: 1; }
  .rune-entry:hover { border-color: rgba(56,189,248,0.3); }
  .rune-entry.active {
    border-color: rgba(56,189,248,0.4);
    background: rgba(56,189,248,0.04);
  }

  .rune-symbol {
    font-size: clamp(15px, 3.2vw, 22px); line-height: 1;
    color: var(--indigo); min-width: clamp(18px, 3.5vw, 26px);
    text-align: center; transition: all 0.3s ease;
  }
  .rune-entry:hover .rune-symbol, .rune-entry.active .rune-symbol {
    color: var(--cyan);
    animation: runeGlow 1.8s ease-in-out infinite;
  }
  @keyframes runeGlow {
    0%,100% { filter: drop-shadow(0 0 4px var(--cyan)); }
    50% { filter: drop-shadow(0 0 12px var(--cyan)) drop-shadow(0 0 22px var(--cyan-glow)); }
  }

  .rune-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(11px, 2.6vw, 16px); font-style: italic;
    color: rgba(224,231,255,0.55); letter-spacing: 0.04em;
    transition: color 0.3s;
  }
  .rune-entry:hover .rune-name, .rune-entry.active .rune-name { color: var(--pale); }

  .book-footer {
    text-align: center;
    padding-top: clamp(8px, 1.8vw, 14px);
    border-top: 1px solid rgba(56,189,248,0.13);
    font-size: clamp(8px, 1.6vw, 10px);
    color: rgba(56,189,248,0.3); letter-spacing: 0.18em;
  }

  /* ── SPINE ── */
  #book-spine {
    flex: 0 0 clamp(22px, 2.8vw, 34px);
    background: linear-gradient(180deg, #060412 0%, #0c0928 50%, #060412 100%);
    border-left: 1px solid rgba(56,189,248,0.18);
    border-right: 1px solid rgba(56,189,248,0.18);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; transition: background 0.3s;
  }
  #book-spine:hover {
    background: linear-gradient(180deg, #0c0928 0%, #16124a 50%, #0c0928 100%);
  }
  #book-spine::before, #book-spine::after {
    content: '';
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(56,189,248,0.25), transparent);
  }
  #book-spine::before { top: 0; height: 38%; }
  #book-spine::after { bottom: 0; height: 38%; }

  .spine-symbol {
    font-size: clamp(13px, 2.2vw, 19px); color: var(--gold); z-index: 1;
    animation: spineGlow 3s ease-in-out infinite;
  }

  /* Vertical hints around the spine symbol */
  #book-spine { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }

  .spine-hint-top, .spine-hint-bottom {
    font-size: clamp(9px, 2.2vw, 12px);
    color: var(--cyan); letter-spacing: 0.08em; white-space: nowrap;
    opacity: 0.9; font-weight: 500; transform-origin: center;
  }
  .spine-hint-top { animation: floatHint 2.4s ease-in-out infinite; animation-delay: 0s; }
  .spine-hint-bottom { animation: floatHint 2.4s ease-in-out infinite; animation-delay: 0.8s; }
  @keyframes floatHint {
    0%, 100% { transform: translateY(0); opacity: 0.6; }
    50% { transform: translateY(-8px); opacity: 1; }
  }
  @keyframes spineGlow {
    0%,100% { filter: drop-shadow(0 0 4px var(--gold)); opacity: 0.65; }
    50% { filter: drop-shadow(0 0 16px var(--gold)) drop-shadow(0 0 30px var(--gold-glow)); opacity: 1; }
  }

  /* ── RIGHT PAGE ── */
  #page-right {
    flex: 1;
    background: linear-gradient(155deg, #0c0a22 0%, #0a0818 100%);
    padding: clamp(14px, 2.8vw, 26px) clamp(12px, 2.5vw, 24px);
    position: relative; overflow: hidden;
  }
  #page-right::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 80% 15%, rgba(56,189,248,0.05) 0%, transparent 55%),
      radial-gradient(ellipse at 15% 85%, rgba(96,165,250,0.05) 0%, transparent 50%);
    pointer-events: none;
  }
  #page-right::after {
    content: '◈';
    position: absolute;
    bottom: clamp(10px,2vw,16px); right: clamp(12px,2.2vw,18px);
    font-size: clamp(16px, 2.8vw, 24px);
    color: rgba(56,189,248,0.1); pointer-events: none;
  }

  /* Page flip sweep */
  .page-sweep {
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, transparent, rgba(56,189,248,0.7), transparent);
    pointer-events: none; opacity: 0; z-index: 10;
  }
  .page-sweep.active { animation: sweepAcross 0.55s ease-in-out forwards; }
  @keyframes sweepAcross {
    0%   { left: 0%; opacity: 1; }
    100% { left: 100%; opacity: 0; }
  }

  /* ── WELCOME PAGE ── */
  #welcome-page {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: clamp(12px, 2.8vw, 20px);
    padding: clamp(16px, 3vw, 28px);
    transition: opacity 0.35s ease;
  }
  .welcome-rune {
    font-size: clamp(40px, 10vw, 64px); color: var(--indigo);
    animation: welcomePulse 3s ease-in-out infinite, breatheBlue 6s ease-in-out infinite;
  }
  @keyframes welcomePulse {
    0%,100% { filter: drop-shadow(0 0 8px var(--indigo)); opacity: 0.65; }
    50% { filter: drop-shadow(0 0 28px var(--cyan)) drop-shadow(0 0 48px var(--cyan-glow)); opacity: 1; }
  }

  @keyframes breatheBlue {
    0%,100% { transform: scale(1); box-shadow: 0 0 8px rgba(96,165,250,0.25); }
    50% { transform: scale(1.02); box-shadow: 0 0 22px rgba(96,165,250,0.55); }
  }
  .welcome-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(12px, 3vw, 16px); font-style: italic;
    color: rgba(224,231,255,0.45); line-height: 1.8; max-width: 260px;
  }
  .welcome-hint {
    font-size: clamp(8px, 1.8vw, 10px);
    color: rgba(56,189,248,0.35); letter-spacing: 0.16em;
    animation: fadeHint 3s ease-in-out infinite;
  }
  @keyframes fadeHint { 0%,100%{opacity:0.35} 50%{opacity:0.7} }

  /* ── QUALITY PAGE CONTENT ── */
  #page-content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    gap: clamp(8px, 1.8vw, 14px);
    padding: clamp(14px, 2.8vw, 26px) clamp(12px, 2.5vw, 24px);
    opacity: 0; pointer-events: none;
  }
  #page-content.visible { opacity: 1; pointer-events: all; }

  @keyframes pageFlipOut {
    0%   { opacity: 1; transform: perspective(600px) rotateY(0deg); }
    100% { opacity: 0; transform: perspective(600px) rotateY(-18deg) scaleX(0.88); }
  }
  @keyframes pageFlipIn {
    0%   { opacity: 0; transform: perspective(600px) rotateY(18deg) scaleX(0.88); }
    100% { opacity: 1; transform: perspective(600px) rotateY(0deg); }
  }

  .page-illustration {
    flex: 1;
    min-height: 0;
    border-radius: clamp(6px, 1.4vw, 10px);
    overflow: hidden;
    border: 1px solid rgba(56,189,248,0.22);
    background: rgba(56,189,248,0.04) center/cover no-repeat;
    position: relative;
    display: flex;
    align-items: flex-end;
  }
  .page-illustration img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .page-overlay {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: clamp(18px, 4vw, 28px);
    display: flex; flex-direction: column; gap: clamp(10px, 1.8vw, 14px);
    background: linear-gradient(transparent 35%, rgba(10,8,24,0.95) 100%);
    color: var(--pale);
    z-index: 1;
  }
  .page-illustration::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 45%, rgba(10,8,24,0.8) 100%);
    pointer-events: none;
  }

  .page-quality-number {
    font-size: clamp(7px, 1.6vw, 9px);
    color: rgba(56,189,248,0.38); letter-spacing: 0.28em; text-transform: uppercase;
  }
  .page-quality-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(20px, 5vw, 34px);
    font-weight: 300; font-style: italic;
    color: var(--pale); letter-spacing: 0.03em;
    min-height: clamp(28px, 5vw, 42px);
  }
  .page-divider {
    width: clamp(28px, 7vw, 48px); height: 1px; flex-shrink: 0;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }
  .page-quality-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(11px, 2.6vw, 14px);
    font-weight: 300; line-height: 1.85;
    color: rgba(224,231,255,0.6); flex: 1;
  }

  /* ── MOBILE NAV ── */
  #mobile-rune-nav {
    display: none;
    position: absolute;
    bottom: clamp(8px,2vw,12px); left: 0; right: 0;
    justify-content: center; align-items: center;
    gap: 14px; z-index: 20; padding: 8px 16px;
  }
  .mobile-rune {
    font-size: 22px; color: var(--indigo); cursor: pointer;
    padding: 4px; transition: all 0.3s; border-radius: 50%;
  }
  .mobile-rune.active, .mobile-rune:hover {
    color: var(--cyan);
    filter: drop-shadow(0 0 6px var(--cyan));
  }
  .mobile-spine-btn {
    font-size: 22px; color: var(--gold); cursor: pointer; padding: 4px;
    animation: spineGlow 3s ease-in-out infinite;
  }

  @media (max-width: 580px) {
    #page-left { flex: 0 0 0; display: none; }
    /* keep the spine visible on mobile so the "appuies/ici" hint remains tappable */
    #book-spine { flex: 0 0 clamp(22px, 2.8vw, 34px); display: flex; }
    #book-wrapper { width: 94vw; height: 76vh; }
    #mobile-rune-nav { display: flex !important; }
    #page-right { padding-bottom: 60px; }
  }

  /* ── FINAL SCREEN ── */
  #final-screen {
    position: fixed; inset: 0; z-index: 40;
    background-color: var(--dark);
    display: flex; flex-direction: row; align-items: center;
    gap: clamp(20px, 5vw, 40px);
    padding: clamp(28px, 8vw, 48px) clamp(24px, 7vw, 40px);
    opacity: 0; pointer-events: none;
    transition: opacity 1s ease; overflow-y: auto;
  }
  #final-screen.active { opacity: 1; pointer-events: all; }

  /* Hero image on left side */
  #final-screen::before {
    content: '';
    flex: 0 0 45%;
    height: 80%;
    background-image: url('assets/images/hero.jpeg');
    background-size: cover; background-position: center; background-repeat: no-repeat;
    border-radius: 8px;
    order: -1;
  }

  .final-content {
    flex: 1;
    display: flex; flex-direction: column;
    gap: clamp(12px, 2.5vw, 20px);
    z-index: 2;
  }

  /* Final screen fallback for very small screens: stack image and content */
  @media (max-width: 480px) {
    #final-screen { flex-direction: column; align-items: stretch; padding: clamp(18px, 5vw, 24px); }
    #final-screen::before { flex: 0 0 auto; width: 100%; height: 36vh; order: 0; border-radius: 8px; }
    .final-content { order: 1; width: 100%; }
  }

  #canvas-petals {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  .final-label, .final-name, .final-age, .final-signature, .back-btn { position: relative; z-index: 2; }
  .final-message-container { position: relative; z-index: 2; cursor: pointer; }

  .final-label {
    font-size: clamp(9px, 2.5vw, 11px); color: rgba(56,189,248,0.85);
    letter-spacing: 0.2em; margin-bottom: clamp(8px, 2.5vw, 14px); text-transform: uppercase;
  }
  .final-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(42px, 13vw, 64px); font-weight: 300; color: var(--pale);
    line-height: 1; margin-bottom: 4px; letter-spacing: -0.01em;
  }
  .final-age {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(14px, 4vw, 20px); font-style: italic; color: var(--cyan);
    margin-bottom: clamp(24px, 7vw, 40px); letter-spacing: 0.05em;
  }
  .final-message {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(15px, 4.2vw, 18px); font-weight: 300; line-height: 1.9;
    color: rgba(245,243,255,0.88);
    border-left: 2px solid var(--indigo);
    padding-left: clamp(14px, 4vw, 20px);
    margin-bottom: clamp(20px, 6vw, 30px);
  }
  .final-signature {
    font-size: clamp(10px, 2.8vw, 12px); color: rgba(56,189,248,0.38); letter-spacing: 0.12em;
  }
  .final-rose {
    position: absolute; bottom: clamp(20px,6vw,36px); right: clamp(20px,6vw,36px);
    font-size: clamp(36px, 10vw, 56px); opacity: 0.1;
    animation: floatRose 4s ease-in-out infinite; z-index: 1; pointer-events: none;
  }
  @keyframes floatRose { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-10px) rotate(5deg)} }

  .back-btn {
    align-self: flex-start;
    background: rgba(8,6,24,0.5); border: 1px solid rgba(56,189,248,0.3);
    color: var(--cyan); font-family: 'Share Tech Mono', monospace;
    padding: 8px 16px; font-size: clamp(10px, 2.8vw, 12px);
    border-radius: 4px; cursor: pointer; transition: all 0.3s;
    margin-top: 24px; letter-spacing: 0.05em;
  }
  .back-btn:hover {
    background: rgba(56,189,248,0.15); border-color: var(--cyan);
    box-shadow: 0 0 12px var(--cyan-glow);
  }


</style>
</head>
<body>

<div class="scanlines"></div>
<div id="terminal"><div id="terminal-output"></div></div>
<div id="glitch-overlay"></div>

<!-- ── GRIMOIRE SCREEN ── -->
<div id="grimoire-screen">
  <canvas id="canvas-stars"></canvas>
  <canvas id="canvas-sparks"></canvas>

  <div id="book-wrapper">
    <div id="book">

      <!-- LEFT PAGE -->
      <div id="page-left">
        <div class="book-header">
          <span class="book-header-label">Grimoire de</span>
          <div class="book-header-name">Nadège</div>
        </div>
        <div class="rune-list" id="rune-list"></div>
        <div class="book-footer">✦ · · ✦ · · ✦</div>
      </div>

      <!-- SPINE -->
      <div id="book-spine" onclick="showFinal()" title="Révéler le message">
        <span class="spine-hint-top">appuies</span>
        <span class="spine-symbol">✦</span>
        <span class="spine-hint-bottom">ici</span>
      </div>

      <!-- RIGHT PAGE -->
      <div id="page-right">
        <div class="page-sweep" id="page-sweep"></div>

        <!-- Welcome state -->
        <div id="welcome-page">
          <div class="welcome-rune">⟡</div>
          <div class="welcome-text">Chaque page de ce grimoire révèle une vérité sur toi…</div>
          <div class="welcome-hint">✦ choisis une rune pour commencer ✦</div>
        </div>

        <!-- Quality content -->
        <div id="page-content">
          <div class="page-illustration" id="page-illustration">
            <div class="page-overlay">
              <div class="page-quality-number" id="page-number"></div>
              <div class="page-quality-title" id="page-title"></div>
              <div class="page-divider"></div>
              <div class="page-quality-desc" id="page-desc"></div>
            </div>
          </div>
        </div>

        <!-- Mobile-only bottom nav -->
        <div id="mobile-rune-nav"></div>

      </div>

    </div>
  </div>
</div>

<!-- ── FINAL SCREEN ── -->
<div id="final-screen">
  <canvas id="canvas-petals"></canvas>
  <div class="final-content">
    <div class="final-label">&gt; message_final.txt</div>
    <div class="final-name">Nadège,</div>
    <div class="final-age">21 ans · 17 juin</div>
    <div class="final-message-container" onclick="skipTyping()">
      <div class="final-message" id="final-msg"></div>
    </div>
    <div class="final-signature">— avec tout mon amour 🔮</div>
    <button class="back-btn" onclick="backToGrimoire()">← retourner au grimoire</button>
  </div>
  <div class="final-rose">🔮</div>
</div>

<script>
// ── DATA ──
const qualities = [
  { rune:'✦', label:'Intelligente', quality:'Intelligente', photo:'assets/images/intelligente.jpeg',
    desc:'Une intelligence rare, celle qui observe, analyse et comprend avant même de parler. Tu transformes chaque défi en apprentissage.' },
  { rune:'◈', label:'Belle', quality:'Belle', photo:'assets/images/belle.jpeg',
    desc:'Une beauté qui va bien au-delà de l\'apparence — elle rayonne de l\'intérieur, et tout le monde qui te croise le ressent.' },
  { rune:'⟡', label:'Ambitieuse', quality:'Ambitieuse', photo:'assets/images/ambitieuse.jpeg',
    desc:'Tu ne rêves pas les yeux fermés — tu construis, tu agis, tu avances. Tes objectifs te définissent autant que tes valeurs.' },
  { rune:'✧', label:'Forte', quality:'Forte', photo:'assets/images/forte.jpeg',
    desc:'Une force tranquille qui ne cède pas face à la tempête. Tu portes les épreuves avec une dignité qui force l\'admiration.' },
  { rune:'⋆', label:'Humble', quality:'Humble', photo:'assets/images/humble.jpeg',
    desc:'Dans un monde qui crie fort, ton humilité est une grâce. Tu sais qui tu es sans avoir besoin de le prouver à personne.' }
];

const finalMessage = "Joyeux anniversaire Nadège. Que cette nouvelle année de vie soit pour toi une saison de bénédictions infinies, d'abondance, de paix profonde et de prospérité. Et surtout, que chaque jour qui passe soit une occasion de te rapprocher un peu plus de Dieu et d'approfondir ta relation avec Lui.";

// ── TERMINAL ──
const termLines = [
  { text: '<span class="t-prompt">LOVE_OS</span> ~ boot sequence initiated...', delay: 0 },
  { text: '', delay: 400 },
  { text: '<span class="t-prompt">></span> Loading kernel... <span class="t-ok">[ OK ]</span>', delay: 800 },
  { text: '<span class="t-prompt">></span> Mounting heart.dat... <span class="t-ok">[ OK ]</span>', delay: 1400 },
  { text: '<span class="t-prompt">></span> Scanning memories... ████████ <span class="t-ok">100%</span>', delay: 2000 },
  { text: '<span class="t-prompt">></span> Decrypting soul.core... <span class="t-ok">[ OK ]</span>', delay: 2700 },
  { text: '', delay: 3200 },
  { text: '<span class="t-prompt">></span> User identified: <span style="color:#e0e7ff;font-weight:bold">NADÈGE v21.0</span>', delay: 3600 },
  { text: '<span class="t-prompt">></span> Status: <span class="t-ok">exceptional human detected</span>', delay: 4300 },
  { text: '', delay: 4800 },
  { text: '<span class="t-prompt">></span> Opening grimoire... <span class="t-ok">[ DONE ]</span>', delay: 5100 },
  { text: '<span class="t-prompt">></span> Welcome, Nadège. <span class="t-bar"></span>', delay: 5700 },
];

function runTerminal() {
  const out = document.getElementById('terminal-output');
  const termEl = document.getElementById('terminal');
  termLines.forEach(({ text, delay }) => {
    setTimeout(() => {
      const span = document.createElement('span');
      span.className = 't-line';
      span.innerHTML = text || '&nbsp;';
      out.appendChild(span);
      requestAnimationFrame(() => span.classList.add('visible'));
      termEl.scrollTop = termEl.scrollHeight;
    }, delay);
  });
  setTimeout(triggerGlitch, 6700);
}

// ── GLITCH ──
function triggerGlitch() {
  const overlay = document.getElementById('glitch-overlay');
  const terminal = document.getElementById('terminal');
  let count = 0;
  const iv = setInterval(() => {
    overlay.style.opacity = count % 2 === 0 ? '0.18' : '0';
    count++;
    if (count > 8) {
      clearInterval(iv);
      overlay.style.opacity = '1';
      setTimeout(() => {
        terminal.style.opacity = '0';
        setTimeout(() => {
          terminal.style.display = 'none';
          overlay.style.transition = 'opacity 0.8s';
          overlay.style.opacity = '0';
          showGrimoire();
        }, 300);
      }, 100);
    }
  }, 80);
}

// ── STARS ──
function initStars() {
  const canvas = document.getElementById('canvas-stars');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const stars = Array.from({length: 120}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.3 + 0.2,
    a: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.007 + 0.002,
    ci: Math.floor(Math.random() * 2)
  }));
  const sc = ['rgba(56,189,248,', 'rgba(96,165,250,'];
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.speed;
      const alpha = (Math.sin(s.a) + 1) / 2;
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `${sc[s.ci]}${alpha * 0.72})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ── MAGIC SPARKS ──
let sparks = [];
function initSparks() {
  const canvas = document.getElementById('canvas-sparks');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const colors = ['#38bdf8','#60a5fa','#93c5fd','#fbbf24','#e0e7ff'];

  function mkSpark() {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 1.1 + 0.3;
    return {
      x: cx + (Math.random() - 0.5) * 50, y: cy + (Math.random() - 0.5) * 30,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 0.4,
      life: 1, decay: Math.random() * 0.011 + 0.005,
      r: Math.random() * 2.2 + 0.8,
      color: colors[Math.floor(Math.random() * colors.length)]
    };
  }

  sparks = Array.from({length: 55}, mkSpark);

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    sparks.forEach((s, i) => {
      s.x += s.vx; s.y += s.vy; s.vy += 0.014; s.life -= s.decay;
      if (s.life <= 0) sparks[i] = mkSpark();
      ctx.save();
      ctx.globalAlpha = s.life * 0.75;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * s.life, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.shadowColor = s.color; ctx.shadowBlur = 7;
      ctx.fill(); ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ── BUILD GRIMOIRE UI ──
function buildRuneList() {
  const runeList = document.getElementById('rune-list');
  const mobileNav = document.getElementById('mobile-rune-nav');
  runeList.innerHTML = ''; mobileNav.innerHTML = '';

  qualities.forEach((q, i) => {
    const entry = document.createElement('div');
    entry.className = 'rune-entry';
    entry.innerHTML = `<span class="rune-symbol">${q.rune}</span><span class="rune-name">${q.label}</span>`;
    entry.addEventListener('click', () => { openPage(i); resetAutoAdvance(); });
    runeList.appendChild(entry);

    const mRune = document.createElement('span');
    mRune.className = 'mobile-rune'; mRune.textContent = q.rune;
    mRune.addEventListener('click', () => { openPage(i); resetAutoAdvance(); });
    mobileNav.appendChild(mRune);
  });

  const spineBtn = document.createElement('span');
  spineBtn.className = 'mobile-spine-btn'; spineBtn.textContent = '✦';
  spineBtn.addEventListener('click', showFinal);
  mobileNav.appendChild(spineBtn);
}

// ── PAGE NAVIGATION ──
let currentPageIdx = -1;
let isFlipping = false;

function openPage(idx) {
  if (isFlipping || idx === currentPageIdx) return;
  isFlipping = true;

  const q = qualities[idx];
  const welcome = document.getElementById('welcome-page');
  const content = document.getElementById('page-content');
  const sweep = document.getElementById('page-sweep');

  // Update active rune
  document.querySelectorAll('.rune-entry').forEach((el, i) => el.classList.toggle('active', i === idx));
  document.querySelectorAll('.mobile-rune').forEach((el, i) => el.classList.toggle('active', i === idx));

  // Trigger sweep
  sweep.classList.remove('active');
  void sweep.offsetWidth;
  sweep.classList.add('active');

  // Animate out
  const outEl = currentPageIdx === -1 ? welcome : content;
  outEl.style.animation = 'pageFlipOut 0.32s ease-in forwards';

  setTimeout(() => {
    if (currentPageIdx === -1) { welcome.style.display = 'none'; }
    outEl.style.animation = '';

    // Fill content
    document.getElementById('page-number').textContent = `Chapitre ${idx + 1} / ${qualities.length}`;
    document.getElementById('page-desc').textContent = q.desc;
    const illustration = document.getElementById('page-illustration');
    illustration.style.backgroundImage = `url('${q.photo}')`;

    // Type title letter by letter
    const titleEl = document.getElementById('page-title');
    titleEl.textContent = '';
    let ti = 0;
    const tv = setInterval(() => {
      titleEl.textContent += q.quality[ti++];
      if (ti >= q.quality.length) clearInterval(tv);
    }, 55);

    // Animate in
    content.style.animation = 'pageFlipIn 0.35s ease-out forwards';
    content.classList.add('visible');

    setTimeout(() => {
      content.style.animation = '';
      isFlipping = false;
    }, 360);

    currentPageIdx = idx;
  }, 310);
}

// ── FINAL SCREEN ──
let typingInterval = null, currentMessageIndex = 0, isTypingDone = false;
let petalCanvas = null, petalCtx = null, petalTimer = null, petals = [];

function showFinal() {
  stopAutoAdvance();
  document.getElementById('final-screen').classList.add('active');
  const msgEl = document.getElementById('final-msg');
  msgEl.textContent = ''; currentMessageIndex = 0; isTypingDone = false;
  if (typingInterval) clearInterval(typingInterval);
  typingInterval = setInterval(() => {
    msgEl.textContent += finalMessage[currentMessageIndex++];
    if (currentMessageIndex >= finalMessage.length) { clearInterval(typingInterval); isTypingDone = true; }
  }, 26);
  initPetals();
}

function skipTyping() {
  if (isTypingDone) return;
  if (typingInterval) clearInterval(typingInterval);
  document.getElementById('final-msg').textContent = finalMessage;
  isTypingDone = true;
}

function backToGrimoire() {
  document.getElementById('final-screen').classList.remove('active');
  if (petalTimer) { cancelAnimationFrame(petalTimer); petalTimer = null; }
  // restart auto-advance when returning
  startAutoAdvance();
}

// ── PETALS / COSMIC PARTICLES ──
function initPetals() {
  petalCanvas = document.getElementById('canvas-petals');
  petalCtx = petalCanvas.getContext('2d');
  petalCanvas.width = window.innerWidth; petalCanvas.height = window.innerHeight;
  petals = Array.from({length: 35}, () => createPetal(true));

  function animate() {
    if (!document.getElementById('final-screen').classList.contains('active')) return;
    petalCtx.clearRect(0, 0, petalCanvas.width, petalCanvas.height);
    petals.forEach(p => {
      p.y += p.speedY; p.x += p.speedX + Math.sin(p.angle) * 0.3;
      p.angle += p.angleSpeed; p.rotation += p.rotationSpeed;
      petalCtx.save();
      petalCtx.translate(p.x, p.y); petalCtx.rotate(p.rotation);
      petalCtx.beginPath(); petalCtx.ellipse(0, 0, p.r, p.r * 0.65, 0, 0, Math.PI * 2);
      const g = petalCtx.createRadialGradient(0, 0, 0, 0, 0, p.r);
      g.addColorStop(0, p.color1); g.addColorStop(1, p.color2);
      petalCtx.fillStyle = g; petalCtx.shadowColor = p.color1; petalCtx.shadowBlur = 5;
      petalCtx.fill(); petalCtx.restore();
      if (p.y > petalCanvas.height + 20 || p.x > petalCanvas.width + 20 || p.x < -20) Object.assign(p, createPetal(false));
    });
    petalTimer = requestAnimationFrame(animate);
  }
  if (petalTimer) cancelAnimationFrame(petalTimer);
  animate();
}

function createPetal(randomY) {
  const colors = [['#60a5fa','#3b82f6'],['#e0e7ff','#93c5fd'],['#38bdf8','#6366f1']];
  const c = colors[Math.floor(Math.random() * colors.length)];
  return {
    x: Math.random() * window.innerWidth, y: randomY ? Math.random() * window.innerHeight : -20,
    r: Math.random() * 7 + 5, speedY: Math.random() * 1.0 + 0.6,
    speedX: Math.random() * 0.5 - 0.25, angle: Math.random() * Math.PI * 2,
    angleSpeed: Math.random() * 0.02 + 0.01, rotation: Math.random() * Math.PI * 2,
    rotationSpeed: Math.random() * 0.02 - 0.01, color1: c[0], color2: c[1]
  };
}

// ── SHOW GRIMOIRE ──
function showGrimoire() {
  initStars();
  initSparks();
  buildRuneList();
  document.getElementById('grimoire-screen').classList.add('active');
  startAutoAdvance();
}

// ── AUTO-ADVANCE (auto-flip pages every N ms) ──
let autoAdvanceTimer = null;
const autoAdvanceDelay = 4000; // 4s per user request

function nextPage() {
  const nextIdx = (currentPageIdx + 1) % qualities.length;
  openPage(nextIdx);
}

function startAutoAdvance() {
  stopAutoAdvance();
  // only start if grimoire is visible
  if (!document.getElementById('grimoire-screen').classList.contains('active')) return;
  autoAdvanceTimer = setInterval(() => {
    // don't advance while flipping
    if (!isFlipping) nextPage();
  }, autoAdvanceDelay);
}

function stopAutoAdvance() {
  if (autoAdvanceTimer) { clearInterval(autoAdvanceTimer); autoAdvanceTimer = null; }
}

function resetAutoAdvance() {
  stopAutoAdvance();
  startAutoAdvance();
}

// ── RESIZE ──
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    ['canvas-stars','canvas-sparks'].forEach(id => {
      const c = document.getElementById(id);
      if (c) { c.width = window.innerWidth; c.height = window.innerHeight; }
    });
    const pc = document.getElementById('canvas-petals');
    if (pc) { pc.width = window.innerWidth; pc.height = window.innerHeight; }
  }, 200);
});

// ── KEYBOARD ──
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('final-screen').classList.contains('active')) backToGrimoire();
  }
});

// ── AUTOPLAY ──

window.addEventListener('DOMContentLoaded', runTerminal);
</script>
</body>
</html>
